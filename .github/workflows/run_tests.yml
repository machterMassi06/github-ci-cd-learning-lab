name: CI - Run tests

# Event triggers: Run this workflow on push to `main` or any pull request targeting `main`.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs: 
  test-suite:
    runs-on: ubuntu-latest
    strategy: 
      matrix: 
        python-version: [3.11,3.12]
    steps:
    # Step 1: Checkout the repository code.
    # This is required to access the files in subsequent steps.
    - name: Checkout repository
      uses: actions/checkout@v6 # always use the stable version of actions 

    - name: Set up python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install python dependancies
      run: |
        python -m pip install --upgrade pip 
        pip install -r ./requirements.txt
    
    # step : run tests defined in run_tests.sh 
    - name: Run test suite 
      run: |
        chmod +x run_tests.sh 
        ./run_tests.sh  